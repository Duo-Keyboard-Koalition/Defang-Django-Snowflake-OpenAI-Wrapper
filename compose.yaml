services:
  django:
    restart: unless-stopped
    build:
      context: ./app
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - DEBUG=False
      - SECRET_KEY=${SECRET_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - CORTEX_HOST=${CORTEX_HOST:-192.168.16.113}
      - CORTEX_PORT=${CORTEX_PORT:-5000}
      - DATABASE_URL=postgres://dkk:dkk@db:5432/dkk
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-dkk}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-dkk}
      POSTGRES_DB: ${POSTGRES_DB:-dkk}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-dkk}"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
