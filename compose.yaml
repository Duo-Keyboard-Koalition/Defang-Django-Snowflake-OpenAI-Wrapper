services:
  django:
    restart: unless-stopped
    build:
      context: ./app
      dockerfile: Dockerfile
    ports:
      - mode: ingress
        target: 8000
        # published: 8000 # uncomment for local dev
    environment:
      - DEBUG=False # set to "True" for local dev
      - SECRET_KEY
      - OPENAI_API_KEY
      - CORTEX_HOST=${CORTEX_HOST:-192.168.16.113}
      - CORTEX_PORT=${CORTEX_PORT:-5000}
      - NATION
      - NATION_PASSWD
      - DATABASE_URL=postgres://django:django@db:5432/django
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      - POSTGRES_USER=django
      - POSTGRES_PASSWORD=django
      - POSTGRES_DB=django
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U django"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
